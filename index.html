<!DOCTYPE html>  
<html lang="es">  
<head>  
  <meta charset="UTF-8" />  
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  
  
  <title>Roberto Durán | Arquitecto Digital</title>  
  <meta name="description" content="Roberto Durán, Arquitecto Digital especializado en IA aplicada, automatización, branding estratégico, diseño gráfico y negocios digitales." />  
  <meta name="theme-color" content="#050505" />  
  
  <!-- Open Graph -->  
  <meta property="og:title" content="Roberto Durán | Arquitecto Digital" />  
  <meta property="og:description" content="IA aplicada, automatización, branding estratégico y negocios digitales." />  
  <meta property="og:image" content="assets/preview.jpg" />  
  <meta property="og:type" content="website" />  
  
  <!-- Fonts -->  
  <link rel="preconnect" href="https://fonts.googleapis.com">  
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  
  <link   
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oxanium:wght@600;700;800&display=swap"   
    rel="stylesheet"  
  >  
  
  <!-- Tailwind CDN -->  
  <script src="https://cdn.tailwindcss.com"></script>  
  
  <script>  
    tailwind.config = {  
      theme: {  
        extend: {  
          colors: {  
            rdBlack: "#050505",  
            rdBlue: "#3177F3",  
            rdWhite: "#FFFFFF",  
            rdGray: "#828282",  
            rdGraphite: "#1C1C1C"  
          },  
          fontFamily: {  
            oxanium: ["Oxanium", "sans-serif"],  
            inter: ["Inter", "sans-serif"]  
          },  
          boxShadow: {  
            glow: "0 0 40px rgba(49, 119, 243, 0.35)",  
            softGlow: "0 0 70px rgba(49, 119, 243, 0.18)"  
          }  
        }  
      }  
    }  
  </script>  
  
  <style>  
    body {  
      background:  
        radial-gradient(circle at top, rgba(49,119,243,0.20), transparent 34%),  
        radial-gradient(circle at bottom right, rgba(49,119,243,0.08), transparent 30%),  
        #050505;  
    }  
  
    .glass-card {  
      background: linear-gradient(  
        180deg,  
        rgba(255,255,255,0.075),  
        rgba(255,255,255,0.025)  
      );  
      border: 1px solid rgba(255,255,255,0.10);  
      backdrop-filter: blur(22px);  
      -webkit-backdrop-filter: blur(22px);  
    }  
  
    .blue-line {  
      background: linear-gradient(90deg, transparent, rgba(49,119,243,0.8), transparent);  
    }  
  
    .action-btn {  
      transition: all 0.25s ease;  
    }  
  
    .action-btn:hover {  
      transform: translateY(-2px);  
      box-shadow: 0 0 28px rgba(49,119,243,0.28);  
      border-color: rgba(49,119,243,0.75);  
    }  
  
    .grid-bg {  
      background-image:  
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),  
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);  
      background-size: 42px 42px;  
      mask-image: linear-gradient(to bottom, black, transparent 82%);  
      -webkit-mask-image: linear-gradient(to bottom, black, transparent 82%);  
    }  
  
    #saveOverlay {  
      transition: opacity 0.45s ease, visibility 0.45s ease;  
    }  
  
    #saveOverlay.hidden-overlay {  
      opacity: 0;  
      visibility: hidden;  
    }   
  
    @media (max-height: 760px) {  
      .glass-card {  
        border-radius: 1.7rem;  
      }  
    }  
  
    /* Botón flotante WhatsApp */  
    .whatsapp-floating {  
      position: fixed;  
      right: 18px;  
      bottom: calc(18px + env(safe-area-inset-bottom));  
      width: 62px;  
      height: 62px;  
      border-radius: 999px;  
      background: #25D366;  
      display: flex;  
      align-items: center;  
      justify-content: center;  
      z-index: 40;  
      box-shadow: 0 0 34px rgba(37, 211, 102, 0.42);  
      transition: transform 0.25s ease, box-shadow 0.25s ease;  
    }  
  
    .whatsapp-floating:hover {  
      transform: translateY(-3px) scale(1.04);  
      box-shadow: 0 0 42px rgba(37, 211, 102, 0.62);  
    }  
  
    .whatsapp-floating svg {  
      width: 32px;  
      height: 32px;  
      fill: #ffffff;  
    }  
  
    @media (max-width: 480px) {  
      .whatsapp-floating {  
        right: 16px;  
        bottom: calc(16px + env(safe-area-inset-bottom));  
        width: 58px;  
        height: 58px;  
      }  
  
      .whatsapp-floating svg {  
        width: 30px;  
        height: 30px;  
      }  
    }

    /* Botón flotante Guardar Contacto */
    .save-contact-floating {
      position: fixed;
      top: calc(18px + env(safe-area-inset-top));
      right: 18px;
      z-index: 40;
      border: 1px solid rgba(49, 119, 243, 0.65);
      background: rgba(49, 119, 243, 0.16);
      color: #ffffff;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 999px;
      padding: 11px 16px;
      font-size: 13px;
      font-weight: 700;
      font-family: Inter, sans-serif;
      box-shadow: 0 0 26px rgba(49, 119, 243, 0.28);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .save-contact-floating:hover {
      transform: translateY(-2px);
      border-color: rgba(49, 119, 243, 1);
      box-shadow: 0 0 34px rgba(49, 119, 243, 0.42);
    }

    @media (max-width: 480px) {
      .save-contact-floating {
        top: calc(14px + env(safe-area-inset-top));
        right: 14px;
        padding: 10px 14px;
        font-size: 12px;
      }
    }
  </style>  
</head>  
  
<body class="min-h-screen text-rdWhite font-inter overflow-x-hidden">  
  
  <!-- Auto-save overlay -->  
  <section   
    id="saveOverlay"   
    class="fixed inset-0 z-50 flex items-center justify-center bg-rdBlack px-6"  
    aria-label="Guardando contacto"  
  >  
    <div class="glass-card max-w-sm w-full rounded-[2rem] p-8 text-center shadow-glow">  
      <img   
        src="assets/rd-isotipo.svg"   
        alt="Logo Roberto Durán"   
        class="w-44 h-auto mx-auto mb-6 object-contain"  
        loading="eager"  
      />  
  
      <p class="font-oxanium text-xl font-bold tracking-wide">  
        ROBERTO DURÁN  
      </p>  
  
      <p class="text-rdGray text-sm mt-2">  
        Preparando contacto digital...  
      </p>  
  
      <button   
        onclick="downloadVCard()"   
        class="mt-6 w-full rounded-full bg-rdBlue px-5 py-3 font-semibold text-white"  
      >  
        Guardar contacto  
      </button>  
  
      <button   
        onclick="hideOverlay()"   
        class="mt-3 text-sm text-rdGray hover:text-white"  
      >  
        Continuar a la V-Card  
      </button>  
    </div>  
  </section>  
  
  <!-- Background grid -->  
  <div class="grid-bg fixed inset-0 pointer-events-none opacity-70"></div>  
  
  <main class="relative z-10 min-h-[100svh] flex items-start justify-center px-3 py-4 sm:px-5 sm:py-10">  
  
    <article class="glass-card w-full max-w-[460px] rounded-[2rem] sm:rounded-[2.4rem] overflow-hidden shadow-glow">  
  
      <!-- Header -->  
      <header class="relative px-5 sm:px-7 pt-7 sm:pt-12 pb-5 sm:pb-7 text-center">  
  
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-48 h-48 sm:w-56 sm:h-56 bg-rdBlue/20 blur-[80px] sm:blur-[90px] rounded-full"></div>  
  
        <div class="relative">  
  
          <!-- Foto de perfil responsive -->  
          <div class="mx-auto w-32 h-32 sm:w-44 sm:h-44 rounded-full p-[3px] bg-gradient-to-br from-rdBlue to-white/10 shadow-glow">  
            <img   
              src="assets/roberto-profile.webp"   
              alt="Foto de Roberto Durán"  
              class="w-full h-full object-cover rounded-full bg-rdGraphite"  
              loading="lazy"  
            />  
          </div>  
  
          <p class="mt-5 sm:mt-7 text-[0.65rem] sm:text-sm uppercase tracking-[0.32em] sm:tracking-[0.35em] text-rdBlue font-semibold">  
            Arquitecto Digital  
          </p>  
  
          <h1 class="font-oxanium text-[clamp(2.05rem,8.4vw,3.25rem)] font-extrabold tracking-[-0.05em] mt-2 sm:mt-3 leading-none whitespace-nowrap">  
            ROBERTO DURÁN  
          </h1>  
  
          <p class="mt-4 sm:mt-5 text-rdGray text-[0.95rem] sm:text-lg leading-relaxed max-w-sm mx-auto">  
            Estratega visual y especialista en IA. Ayudo a emprendedores a escalar mediante sistemas inteligentes y diseño de alto impacto.  
          </p>  
  
        </div>  
      </header>  
  
      <div class="blue-line h-[1px] w-full opacity-80"></div>  
  
      <!-- Manifesto -->  
      <section class="px-5 sm:px-7 py-4 sm:py-6">  
        <div class="rounded-[1.6rem] sm:rounded-3
